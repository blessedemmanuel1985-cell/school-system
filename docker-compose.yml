version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: school_db
    environment:
      POSTGRES_USER: schooladmin
      POSTGRES_PASSWORD: schoolpassword
      POSTGRES_DB: school_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - school-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_backend
    environment:
      DATABASE_URL: postgresql://schooladmin:schoolpassword@postgres:5432/school_management
      NODE_ENV: development
      JWT_SECRET: your-jwt-secret-key-change-in-production
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - school-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - school-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  school-network:
    driver: bridge
